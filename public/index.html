<!DOCTYPE html>
<html>
<head>
    <title>FUNBOT LOGIN</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            background: #0a0a0a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .box {
            background: linear-gradient(145deg, #1a1a2e, #16213e);
            padding: 40px;
            border-radius: 20px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.8);
            border: 1px solid #2a2a4a;
        }
        h2 {
            text-align: center;
            color: #fff;
            font-size: 28px;
            margin-bottom: 25px;
        }
        h2 span {
            color: #f0a500;
        }
        input {
            width: 100%;
            padding: 14px 18px;
            margin-top: 12px;
            border: none;
            border-radius: 10px;
            background: #0f0f1f;
            color: #fff;
            font-size: 16px;
            outline: 1px solid #2a2a4a;
            transition: 0.3s;
        }
        input:focus {
            outline: 1px solid #f0a500;
        }
        input::placeholder {
            color: #666;
        }
        button {
            width: 100%;
            padding: 14px;
            margin-top: 20px;
            border: none;
            border-radius: 10px;
            background: #f0a500;
            color: #0a0a0a;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover {
            background: #ffbe2e;
            transform: scale(1.02);
        }
        #status {
            margin-top: 15px;
            font-weight: bold;
            text-align: center;
            color: #fff;
            min-height: 30px;
        }
        #debug {
            margin-top: 20px;
            background: #0a0a0a;
            color: #00ff88;
            height: 250px;
            overflow: auto;
            padding: 12px;
            font-size: 12px;
            font-family: 'Courier New', monospace;
            border-radius: 10px;
            border: 1px solid #1a1a3a;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        #debug::-webkit-scrollbar {
            width: 6px;
        }
        #debug::-webkit-scrollbar-track {
            background: #0a0a0a;
        }
        #debug::-webkit-scrollbar-thumb {
            background: #f0a500;
            border-radius: 10px;
        }
        .footer {
            text-align: center;
            margin-top: 15px;
            color: #444;
            font-size: 12px;
        }
        .footer a {
            color: #f0a500;
            text-decoration: none;
        }
    </style>
</head>
<body>

    <div class="box">
        <h2>🤖 <span>FUNBOT</span> LOGIN</h2>

        <input id="user" placeholder="👤 Main Bot Username">
        <input id="pass" type="password" placeholder="🔐 Main Bot Password">

        <button onclick="login()">🚀 LOGIN</button>

        <div id="status">🔌 Enter credentials to connect</div>

        <div id="debug">⚡ Logs will appear here...</div>

        <div class="footer">
            💡 <a href="#" onclick="document.getElementById('help').style.display='block'">Commands</a>
            <div id="help" style="display:none;color:#888;margin-top:10px;font-size:13px;text-align:left;">
                <b>📖 Commands (in PM):</b><br>
                <code>Dd room username password</code> → Create bot<br>
                <code>help</code> or <code>مساعدة</code> → Show help
            </div>
        </div>
    </div>

    <script>
        async function login() {
            let user = document.getElementById("user").value.trim();
            let pass = document.getElementById("pass").value.trim();

            if (!user || !pass) {
                document.getElementById("status").innerHTML = "⚠️ Please enter username and password";
                return;
            }

            document.getElementById("status").innerHTML = "⏳ Connecting...";
            document.getElementById("debug").innerText = "⏳ Connecting to server...";

            try {
                let res = await fetch("/login", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ username: user, password: pass })
                });

                let data = await res.json();

                document.getElementById("status").innerHTML = data.success ? "✅ " + data.message : "❌ " + data.message;

                if (data.debug) {
                    document.getElementById("debug").innerText = data.debug.join("\n");
                }

            } catch (err) {
                document.getElementById("status").innerHTML = "❌ Connection error";
                document.getElementById("debug").innerText = "Error: " + err.message;
            }
        }

        // Auto-refresh logs every 3 seconds
        setInterval(async () => {
            try {
                let res = await fetch("/debug");
                let data = await res.json();
                if (data.logs) {
                    document.getElementById("debug").innerText = data.logs.join("\n");
                }
            } catch (err) {
                // silent fail
            }
        }, 3000);

        // Enter key to login
        document.addEventListener("keydown", function(e) {
            if (e.key === "Enter") {
                login();
            }
        });
    </script>

</body>
</html>
